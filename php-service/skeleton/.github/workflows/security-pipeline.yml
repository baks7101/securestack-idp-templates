name: Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Gitleaks directory scan
        run: docker run --rm -v "${{ '${{ github.workspace }}' }}:/repo" zricethezav/gitleaks:latest dir /repo --redact -v --exit-code 1

  static-analysis:
    name: PHP Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install PHPStan
        run: composer require --dev phpstan/phpstan --no-interaction
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  vulnerability-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, static-analysis, vulnerability-scan]
    steps:
      - name: All security checks passed
        run: echo "All security checks passed. Safe to proceed."
